<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parque_avellaneda_formulario</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="form.css" type="text/css">
</head>

<body>
    <header>
        <a class="inicio" href="#">🏠︎</a>
        <img class="logo" src="img_prueba/parque_avellaneda.png" alt="nombre">
    </header>
    <main>
        <section class="formulario">
            <h2>¡Queremos conocerte!</h2>

            <form class="form">

                <div class="campos">
                    <div class="grupo">
                        <label for="nombre">¿Cómo te llamas?</label>
                        <input type="text" id="nombre" name="nombre">
                    </div>

                    <div class="grupo">
                        <label for="actividad">¿Qué actividad es de tu interés?</label>
                        <input type="text" id="actividad" name="actividad">
                    </div>

                    <div class="grupo">
                        <label for="frecuencia">¿Con qué frecuencia visitas el parque?</label>
                        <input type="text" id="frecuencia" name="frecuencia">
                    </div>
                </div>

                <div class="comentario">
                    <label for="mensaje">¡Déjanos tu comentario!</label>
                    <textarea id="mensaje" name="mensaje"></textarea>
                </div>
            </form>

            <button class="btn-enviar">Enviar</button>
        </section>

    </main>
    <footer>
        <h5>Humboldt - CABA - Cel: 15-4170-8400 - email: codavis@parqueavellanedaweb.com.ar</h5>
    </footer>
</body>

</html>
